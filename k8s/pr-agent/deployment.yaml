apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-agent
  namespace: pr-agent
  labels:
    app.kubernetes.io/name: pr-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pr-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pr-agent
    spec:
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: copy-codex-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /codex-home
              cp /codex-auth/auth.json /codex-home/auth.json
              chmod 600 /codex-home/auth.json
          volumeMounts:
            - name: codex-auth-secret
              mountPath: /codex-auth
              readOnly: true
            - name: codex-home
              mountPath: /codex-home
      containers:
        - name: pr-agent
          image: your-registry/pr-agent-codex:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - uvicorn
            - pr_agent.servers.github_app:app
          args:
            - --host
            - 0.0.0.0
            - --port
            - "3000"
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: pr-agent-config
            - secretRef:
                name: pr-agent-secret
          volumeMounts:
            - name: codex-home
              mountPath: /root/.codex
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: codex-auth-secret
          secret:
            secretName: codex-auth
            items:
              - key: auth.json
                path: auth.json
        - name: codex-home
          emptyDir: {}
